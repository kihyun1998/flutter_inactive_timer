name: CI

on:
  push:
    branches: [main]
  pull_request:

# Pinned so CI does not drift with the runner's default Flutter.
env:
  FLUTTER_VERSION: "3.41.9"

jobs:
  dart:
    name: Dart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # The gtest harness links the Flutter Windows engine + client wrapper.
      - name: Precache Windows engine artifacts
        run: flutter precache --windows

      # Put cl/link on PATH so CMake uses MSVC regardless of the runner's VS layout.
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake -S windows/test -B build/win-test -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build/win-test

      - name: Test
        run: ctest --test-dir build/win-test --output-on-failure

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Must build first, or the generated Flutter/ephemeral/*.xcfilelist files
      # are missing and the Xcode build fails.
      - name: Build macOS app
        run: flutter build macos --debug
        working-directory: example

      - name: Run XCTest
        working-directory: example
        run: |
          xcodebuild test \
            -workspace macos/Runner.xcworkspace \
            -scheme Runner \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO
