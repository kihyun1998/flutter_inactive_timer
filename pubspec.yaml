name: flutter_inactive_timer
description: "Detect user inactivity on Windows and macOS desktop apps: configurable timeout, percentage or fixed-lead-time warnings, and a live countdown for auto-logout and session timeouts."
version: 4.0.0
homepage: https://github.com/kihyun1998/flutter_inactive_timer
repository: https://github.com/kihyun1998/flutter_inactive_timer
issue_tracker: https://github.com/kihyun1998/flutter_inactive_timer/issues
documentation: https://github.com/kihyun1998/flutter_inactive_timer#readme

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.0.0"

dependencies:
  flutter:
    sdk: flutter
  plugin_platform_interface: ^2.0.2
  # Native memory allocation for the FFI idle-duration bindings (ADR-0004).
  # dart:ffi can declare a struct but cannot allocate one; `calloc` is the
  # standard allocator for that, published by the Dart team.
  ffi: ^2.1.0
  # Already present transitively via flutter; named explicitly because the FFI
  # sources import it directly, and because it must survive dropping flutter.
  meta: ^1.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  fake_async: ^1.3.1

# No `flutter: plugin:` block: the idle duration is read through `dart:ffi`
# rather than a method channel (ADR-0004), so there is no native plugin class
# to register and no native build for consumers.