name: CI

on:
  push:
    branches: [main]
  pull_request:

# Pinned so CI does not drift with the runner's default Flutter.
env:
  FLUTTER_VERSION: "3.41.9"

jobs:
  dart:
    name: Dart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # No Flutter here at all. The package is pure Dart since 5.0.0
      # (ADR-0005), and setting up Flutter anyway would let a Flutter-only
      # dependency creep back in without the gate noticing.
      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - run: dart --version

      # `--no-example` matters here: `pub get` otherwise also resolves
      # `example/`, which is a Flutter app, and this job has no Flutter SDK by
      # design. Without the flag the job fails before it reaches any gate.
      - name: Install dependencies
        run: dart pub get --no-example

      # Checks every Dart file including the examples' — formatting needs no
      # package resolution. It does print a resolution warning for
      # `example/analysis_options.yaml`, which pulls in flutter_lints that this
      # job deliberately cannot see; that warning is expected and not a failure.
      - name: Format check
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze
        run: dart analyze

      - name: Test
        run: dart test --coverage=coverage

      # `--check-ignore` is load-bearing: without it the `coverage:ignore`
      # regions around the FFI plumbing — which cannot execute on this host —
      # land in the denominator and sink the gate below.
      - name: Format coverage
        run: |
          dart run coverage:format_coverage \
            --lcov --check-ignore \
            --in=coverage --out=coverage/lcov.info --report-on=lib

      # Self-contained coverage gate — no external service. Fails the build if
      # line coverage drops below the threshold.
      - name: Check coverage threshold
        run: |
          awk -F: '/^LF:/{f+=$2} /^LH:/{h+=$2} END{
            cov = f ? h*100/f : 0
            printf "Line coverage: %.1f%% (%d/%d lines)\n", cov, h, f
            if (cov < 90) { print "::error::line coverage below 90% threshold"; exit 1 }
          }' coverage/lcov.info

  windows:
    name: Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # The gtest harness that used to be configured here went with the C++
      # plugin (ADR-0004). What replaces it is not another native test but this:
      # the Dart job runs on Linux and never loads user32.dll, so this is the
      # only place the Windows binding executes at all. A wrong symbol name or
      # a wrong unit is invisible everywhere else.
      - name: Idle source
        working-directory: example
        run: flutter test integration_test -d windows

      # Proves the package is usable with no Flutter in the picture at all —
      # a plain `dart run` against a pure-Dart consumer (ADR-0005). It exits on
      # its own timeout, so a hang here is a real failure.
      - name: Dart CLI example
        timeout-minutes: 2
        working-directory: example_cli
        run: |
          dart pub get
          dart analyze
          dart run bin/main.dart

  macos:
    name: macOS
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      # Proves the package still builds into a macOS app now that it declares no
      # plugin — a consumer's build is exactly this.
      - name: Build macOS app
        run: flutter build macos --debug
        working-directory: example

      # The XCTest run that used to follow went with the Swift plugin
      # (ADR-0004). The Dart job runs on Linux and never opens IOKit, so this is
      # the only place the macOS binding executes. It also exercises it under
      # the example app's App Sandbox, which is the environment a shipped app
      # runs in — a framework that could not be opened there fails here.
      - name: Idle source
        working-directory: example
        run: flutter test integration_test -d macos

      # Proves the package is usable with no Flutter in the picture at all —
      # a plain `dart run` against a pure-Dart consumer (ADR-0005). It exits on
      # its own timeout, so a hang here is a real failure.
      - name: Dart CLI example
        timeout-minutes: 2
        working-directory: example_cli
        run: |
          dart pub get
          dart analyze
          dart run bin/main.dart
